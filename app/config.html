<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self' http: https: file: data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: file: http: https:; font-src 'self' data:; connect-src 'self'; media-src 'self' blob: data:; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; height: 100vh; display: flex; flex-direction: column;
    font-family: 'Consolas', 'Segoe UI', system-ui, sans-serif;
    background: radial-gradient(circle at 50% 50%, #0d1e33 0%, #040912 100%);
    color: #dbe5f0; }
  header { padding: 12px 18px; background: rgba(8, 14, 23, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0, 240, 255, 0.2); display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; margin: 0; font-weight: 700; color: #fff; text-shadow: 0 0 10px rgba(0, 240, 255, 0.45); text-transform: uppercase; letter-spacing: 1px; }
  header .sub { color: #8ea5c0; font-size: 13px; letter-spacing: 0.5px; }
  .main { flex: 1; display: flex; min-height: 0; }
  .col { padding: 14px; overflow: auto; }
  .grids { width: 240px; border-right: 1px solid rgba(0, 240, 255, 0.15); background: rgba(5, 10, 18, 0.4); backdrop-filter: blur(8px); }
  .editor { flex: 1; }
  .sectitle { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #6f8298; margin: 0 0 8px; }
  .gridrow { padding: 9px 11px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    border: 1px solid transparent; transition: background 0.15s, border-color 0.15s; }
  .gridrow:hover { background: rgba(0, 240, 255, 0.08); border-color: rgba(0, 240, 255, 0.15); }
  .gridrow.active { background: rgba(0, 240, 255, 0.15); border-color: #00f0ff; box-shadow: 0 0 12px rgba(0, 240, 255, 0.25); }
  .gridrow .badge { font-size: 11px; color: #00f0ff; font-weight: bold; text-shadow: 0 0 8px rgba(0, 240, 255, 0.4); }
  .gridrow.dragover { border-color: #00f0ff; box-shadow: 0 0 0 2px #00f0ff; }
  .gridrow .griphandle { cursor: grab; opacity: .4; user-select: none; flex: none; }
  .gridrow:hover .griphandle { opacity: .75; }
  button { background: rgba(28, 39, 53, 0.65); color: #dbe5f0; border: 1px solid rgba(0, 240, 255, 0.25); border-radius: 7px;
    padding: 7px 12px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  button:hover { background: rgba(0, 240, 255, 0.12); border-color: #00f0ff; box-shadow: 0 0 10px rgba(0, 240, 255, 0.2); }
  button.primary { background: rgba(30, 111, 208, 0.75); border-color: #00f0ff; box-shadow: 0 0 10px rgba(0, 240, 255, 0.2); }
  button.primary:hover { background: rgba(0, 240, 255, 0.25); border-color: #00f0ff; box-shadow: 0 0 15px rgba(0, 240, 255, 0.45); }
  button.primary:disabled { background: #111a24; border-color: rgba(0, 240, 255, 0.1); color: #5b6b7e; cursor: default; box-shadow: none; }
  button.danger { background: rgba(106, 30, 42, 0.65); border-color: #ff4d6d; }
  button.danger:hover { background: rgba(255, 77, 109, 0.25); border-color: #ff4d6d; box-shadow: 0 0 12px rgba(255, 77, 109, 0.35); }
  /* underline-style tabs (settings sections, dashboard Dashboard/Buttons) */
  .tabbar { display: flex; gap: 4px; border-bottom: 1px solid rgba(0, 240, 255, 0.2); margin-bottom: 12px; }
  button.tab { background: transparent; border: none; border-bottom: 2px solid transparent; border-radius: 0;
    color: #8aa0b6; padding: 8px 14px; margin-bottom: -1px; font-weight: 500; transition: all 0.15s; }
  button.tab:hover { background: transparent; color: #00f0ff; text-shadow: 0 0 8px rgba(0, 240, 255, 0.3); }
  button.tab.on { color: #ffffff; border-bottom-color: #00f0ff; text-shadow: 0 0 8px rgba(0, 240, 255, 0.4); }
  input, select { background: rgba(5, 10, 18, 0.85); color: #dbe5f0; border: 1px solid rgba(0, 240, 255, 0.25); border-radius: 6px;
    padding: 7px 9px; font-size: 13px; width: 100%; transition: border-color 0.15s, box-shadow 0.15s; }
  input:focus, select:focus { outline: none; border-color: #00f0ff; box-shadow: 0 0 8px rgba(0, 240, 255, 0.35); }
  .row { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
  .row label { width: 70px; color: #91a4ba; font-size: 13px; flex: none; }
  .secretwrap { display: flex; gap: 6px; align-items: stretch; flex: 1; min-width: 0; }
  .secretwrap input { flex: 1; min-width: 0; width: auto; }
  .reveal { flex: none; width: 34px; padding: 0; font-size: 14px; line-height: 1; }
  .tilegrid { display: grid; gap: 8px; margin: 10px 0 12px; }
  .cell { border-radius: 12px; background: rgba(20, 29, 41, 0.5); border: 1px solid rgba(0, 240, 255, 0.18); cursor: pointer; user-select: none;
    display: flex; flex-direction: column; align-items: center; justify-content: center; color: #bcd; overflow: hidden; transition: all 0.15s; }
  .cell:hover { border-color: #00f0ff; background: rgba(0, 240, 255, 0.05); box-shadow: 0 0 10px rgba(0, 240, 255, 0.15); }
  .cell.empty { background: rgba(13, 20, 29, 0.3); border-style: dashed; border-color: rgba(0, 240, 255, 0.12); color: #4e627a; }
  .cell.sel { border-color: #00f0ff; box-shadow: 0 0 0 2px rgba(0, 240, 255, 0.55), 0 0 15px rgba(0, 240, 255, 0.35); }
  .cell.insel { background: rgba(27, 74, 122, 0.55) !important; border-color: #00f0ff; box-shadow: inset 0 0 0 3px rgba(0, 240, 255, 0.55); }
  .cell .ic { font-size: 30px; line-height: 1; filter: drop-shadow(0 0 4px rgba(0, 240, 255, 0.3)); }
  .cell .lb { font-size: 12px; margin-top: 4px; color: #91a4ba; letter-spacing: 0.5px; }
  .cell.span .ic { font-size: 48px; } .cell.span .cimg { width: 52px; height: 52px; }
  .cell .cimg { width: 34px; height: 34px; object-fit: contain; filter: drop-shadow(0 0 4px rgba(0, 240, 255, 0.3)); }
  .cell.dragover { border-color: #00f0ff; box-shadow: 0 0 0 2px #00f0ff; }
  .cell img { pointer-events: none; -webkit-user-drag: none; }
  .mergebar { display: flex; align-items: center; gap: 12px; margin: 0 0 14px; min-height: 20px; }
  .mergebar.active { background: rgba(19, 36, 58, 0.6); border: 1px solid rgba(0, 240, 255, 0.3); border-radius: 8px; padding: 10px 14px; backdrop-filter: blur(8px); }
  .mergebar .hint { margin: 0; }
  .mergebar b { color: #cfe0f2; }
  .panes { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
  .form { background: rgba(14, 22, 33, 0.7); border: 1px solid rgba(0, 240, 255, 0.18); border-radius: 10px; padding: 14px; flex: 1; min-width: 360px; max-width: 460px; backdrop-filter: blur(8px); }
  .iconbox { background: rgba(14, 22, 33, 0.7); border: 1px solid rgba(0, 240, 255, 0.18); border-radius: 10px; padding: 14px; width: 320px; flex: none; backdrop-filter: blur(8px); }
  .iconopt { display: flex; align-items: center; gap: 8px; padding: 6px 0; cursor: pointer; font-size: 14px; color: #cfe0f2; }
  .iconopt input { width: auto; }
  .iconopt.disabled { opacity: .45; cursor: default; }
  .iconopt .note { color: #6f8298; font-size: 12px; }
  .icondetail { margin: 6px 0 0 26px; min-height: 8px; }
  .icondetail .row { margin: 4px 0; }
  .iconpreview { margin-top: 14px; height: 84px; display: flex; align-items: center; justify-content: center;
    background: rgba(10, 17, 26, 0.6); border: 1px solid rgba(0, 240, 255, 0.15); border-radius: 10px; }
  .iconpreview .em { font-size: 52px; line-height: 1; filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.3)); }
  .iconpreview img { width: 64px; height: 64px; object-fit: contain; filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.3)); }
  .iconpreview .none { color: #41566b; font-size: 13px; }
  .hint { color: #6f8298; font-size: 12px; margin-top: 8px; }
  footer { padding: 12px 18px; background: rgba(8, 14, 23, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid rgba(0, 240, 255, 0.2); display: flex; align-items: center; gap: 14px; }
  footer .state { font-size: 13px; margin-right: auto; }
  footer .state.dirty { color: #ffb454; text-shadow: 0 0 8px rgba(255, 180, 84, 0.4); }
  footer .state.saved { color: #00f0ff; text-shadow: 0 0 8px rgba(0, 240, 255, 0.45); }
  footer button.primary { padding: 9px 30px; font-size: 14px; }
</style>
</head>
<body>
  <header>
    <h1>open-quake Editor</h1>
    <span class="sub">edit, then Save to apply to the panel</span>
    <span class="sub" style="flex:1; text-align:center">🔘 Double-click the knob to switch pages</span>
    <button id="settingsBtn">⚙ Settings</button>
  </header>
  <div class="main">
    <div class="col grids">
      <p class="sectitle">Pages</p>
      <div id="gridlist"></div>
      <div class="row" style="margin-top:12px; gap:6px; flex-wrap:wrap"><button class="primary" id="addGrid">+ Grid</button><button id="addDash">+ Dashboard</button><button id="addApp">+ App</button></div>
    </div>
    <div class="col editor">
      <div id="gridmeta"></div>
      <div id="tilegrid" class="tilegrid"></div>
      <div id="mergebar" class="mergebar"></div>
      <div class="panes">
        <div id="tileform"></div>
        <div id="iconpane"></div>
      </div>
    </div>
  </div>
  <footer>
    <span id="state" class="state"></span>
    <button class="primary" id="saveBtn" disabled>Save</button>
  </footer>
<script src="config.js"></script>
</body>
</html>
