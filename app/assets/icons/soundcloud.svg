    <line x1="88" y1="128" x2="88" y2="178" />
    <line x1="108" y1="118" x2="108" y2="178" />
    <line x1="128" y1="98" x2="128" y2="178" />
    <line x1="148" y1="98" x2="148" y2="178" />
    <line x1="168" y1="108" x2="168" y2="178" />
    <line x1="188" y1="128" x2="188" y2="178" />
    
  </g>
