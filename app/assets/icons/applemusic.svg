<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Background radial glow -->
  <circle cx="256" cy="256" r="230" fill="url(#bgGlow)" />
  
  <!-- Outer tech rings -->
  <circle cx="256" cy="256" r="215" fill="none" stroke="#00f0ff" stroke-width="2.5" stroke-dasharray="120 15 30 15 80 20" opacity="0.65" filter="url(#glow)" />
  <circle cx="256" cy="256" r="185" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.3" />
  
  <!-- HUD crosshair ticks -->
  <path d="M 256 10 L 256 26 M 256 486 L 256 502 M 10 256 L 26 256 M 486 256 L 502 256" stroke="#00f0ff" stroke-width="2.5" opacity="0.7" filter="url(#glow)" />
  
  
  
  <!-- Central Glyph -->
  <g transform="translate(128, 128)" stroke="#00f0ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)">
    
    <path d="M 88 178 C 88 148, 108 138, 128 138 L 128 68 L 198 48 L 198 158 C 198 128, 178 118, 158 118 C 138 118, 128 128, 128 138" />
    <circle cx="98" cy="178" r="20" fill="#00f0ff" stroke="none" />
    <circle cx="168" cy="158" r="20" fill="#00f0ff" stroke="none" />
    <line x1="128" y1="98" x2="198" y2="78" />
    
  </g>
</svg>