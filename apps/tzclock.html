<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920, height=480">
<title>World Clock</title>
<style>
  :root { --bg:#05080d; --fg:#2bff88; --label:#8aa6b4; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg);
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif; }
  #grid { width:100vw; height:100vh; display:grid; }
  .cell { display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; padding:0 12px; min-width:0; }
  /* subtle divider between cells */
  .cell::after { content:''; position:absolute; right:0; top:18%; height:64%; width:1px;
    background:linear-gradient(transparent, rgba(255,255,255,.10), transparent); }
  .cell.edge::after { display:none; }
  .time { color:var(--fg); font-weight:700; line-height:.95; white-space:nowrap;
    letter-spacing:.02em; font-variant-numeric:tabular-nums;
    text-shadow:0 0 .28em currentColor, 0 0 .06em currentColor; }
  .ampm { font-size:.34em; font-weight:700; opacity:.8; margin-left:.18em; vertical-align:.15em; }
  .label { color:var(--label); text-transform:uppercase; font-weight:600;
    letter-spacing:.2em; margin-top:.45em; white-space:nowrap; }
</style>
</head>
<body>
<div id="grid"></div>
<script>
  'use strict';
  // ---- options (passed by the host as a URL #hash: key=value&key=value) ----
  function readOpts() {
    const o = {};
    (location.hash.slice(1) || '').split('&').forEach(kv => {
      const i = kv.indexOf('='); if (i < 0) return;
      o[decodeURIComponent(kv.slice(0, i))] = decodeURIComponent(kv.slice(i + 1).replace(/\+/g, ' '));
    });
    return o;
  }
  const O = readOpts();
  const isUS = (O.mode || 'us') === 'us';
  const fmt24 = O.format === '24';
  const showSec = O.seconds === '1' || O.seconds === 'true';
  const COLORS = { green:'#2bff88', red:'#ff4040', amber:'#ffb000', blue:'#38b6ff', white:'#eef4ff' };
  document.documentElement.style.setProperty('--fg', COLORS[O.color] || COLORS.green);

  const US_ZONES = [['US/Pacific','Pacific'], ['US/Mountain','Mountain'], ['US/Central','Central'], ['US/Eastern','Eastern']];
  const prettify = z => (z || '').split('/').pop().replace(/_/g, ' ');

  // ---- which cells to show ----
  let cells;
  if (isUS) {
    cells = US_ZONES.map(([zone, label]) => ({ zone, label }));
  } else {
    cells = [];
    for (let i = 1; i <= 6; i++) {
      const z = O['c' + i];
      if (z) cells.push({ zone: z, label: (O['l' + i] && O['l' + i].trim()) ? O['l' + i].trim() : prettify(z) });
    }
    if (!cells.length) cells = US_ZONES.map(([zone, label]) => ({ zone, label }));   // nothing picked -> US fallback
  }

  // ---- layout (fill the 1920x480 panel) ----
  const n = cells.length;
  let cols, rows;
  if (isUS) {
    if (O.usLayout === 'grid') { cols = 2; rows = 2; } else { cols = 4; rows = 1; }
  } else if (n <= 3) { cols = n; rows = 1; }
  else { cols = Math.ceil(n / 2); rows = 2; }

  const grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = 'repeat(' + cols + ',1fr)';
  grid.style.gridTemplateRows = 'repeat(' + rows + ',1fr)';

  cells.forEach((c, i) => {
    const cell = document.createElement('div'); cell.className = 'cell';
    if ((i % cols) === cols - 1) cell.classList.add('edge');          // no divider on the last column
    const t = document.createElement('div'); t.className = 'time';
    const l = document.createElement('div'); l.className = 'label'; l.textContent = c.label;
    cell.appendChild(t); cell.appendChild(l); grid.appendChild(cell);
    c.el = t;
  });

  // ---- fit the digits: shrink a sample string until it fits the cell box ----
  const cellW = 1920 / cols, cellH = 480 / rows;
  const sample = (fmt24 ? '88:88' : '88:88') + (showSec ? ':88' : '') + (fmt24 ? '' : ' PM');
  function fitFont() {
    const probe = cells[0].el;
    let size = Math.min(cellH * 0.50, 300);
    probe.style.fontSize = size + 'px'; probe.textContent = sample;
    let guard = 0;
    while (probe.scrollWidth > cellW * 0.86 && size > 16 && guard++ < 400) { size -= 3; probe.style.fontSize = size + 'px'; }
    const labelSize = Math.max(13, Math.min(cellH * 0.13, 38));
    cells.forEach(c => { c.el.style.fontSize = size + 'px'; c.el.parentElement.querySelector('.label').style.fontSize = labelSize + 'px'; });
  }

  // ---- render time per zone (DST-correct via Intl) ----
  function timeString(zone) {
    try {
      const opt = { timeZone: zone, hour: 'numeric', minute: '2-digit', hour12: !fmt24 };
      if (showSec) opt.second = '2-digit';
      return new Intl.DateTimeFormat('en-US', opt).format(new Date());
    } catch (e) { return '--:--'; }
  }
  function paint(el, zone) {
    const s = timeString(zone);
    const m = s.match(/\s?(AM|PM)$/i);
    if (m) {
      el.textContent = s.slice(0, m.index);
      const ap = document.createElement('span'); ap.className = 'ampm'; ap.textContent = m[1].toUpperCase();
      el.appendChild(ap);
    } else { el.textContent = s; }
  }
  function tick() { cells.forEach(c => paint(c.el, c.zone)); }

  fitFont();
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
